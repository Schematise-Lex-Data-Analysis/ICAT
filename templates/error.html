<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Error — ICAT</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Nunito', sans-serif; background: #f0f4f8; color: #2d3748; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); padding: 40px 48px; max-width: 520px; text-align: center; }
    h1 { font-size: 22px; color: #e53e3e; margin-bottom: 12px; }
    p { font-size: 15px; color: #718096; line-height: 1.6; }
    a { display: inline-block; margin-top: 24px; color: #4bc970; font-weight: 700; text-decoration: none; font-size: 14px; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Something went wrong</h1>
    <p>{{ message }}</p>
    <a href="/">← Back to search</a>
  </div>
</body>
</html>
